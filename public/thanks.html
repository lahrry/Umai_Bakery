<html lang="en">

  <head>
     <!-- Google Analytics 4 -->

  <script>
    window.dataLayer = window.dataLayer || [];

    gtag('config', 'G-EJD08WKKJV');

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank you - Umai Bakery</title>

    <style>
      body {
        margin: 0;
        /* ✅ Gill Sans 우선 + 안전 폴백 */
        font-family:
          "Gill Sans",
          "Gill Sans MT",
          "GillSans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;

        background: #faf7f2;
        color: #1b1b1b;
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 640px;
        background: #fff;
        border: 1px solid rgba(0,0,0,0.08);
        border-radius: 18px;
        padding: 30px 24px;
        box-shadow: 0 10px 28px rgba(0,0,0,0.06);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
        letter-spacing: 0.2px;
      }

      p {
        margin: 10px 0;
        font-size: 17px;
        line-height: 1.6;
      }

      .muted {
        opacity: 0.75;
      }

      .btn {
        margin-top: 20px;
        display: inline-block;
        padding: 12px 16px;
        border-radius: 14px;
        border: 1px solid rgba(0,0,0,0.12);
        text-decoration: none;
        color: #1b1b1b;
        background: #e9dccb;
        font-weight: 600;
        transition: transform 0.05s ease, box-shadow 0.1s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h1>Thank you for your order!</h1>

        <p>
          We will send an order confirmation email once payment is received.
        </p>

        <p class="muted">
          See you soon! 💗
        </p>

        <a class="btn" href="/">Back to Home →</a>
      </div>
    </div>
    <script>
  gtag('event', 'preorder_submit');
</script>

  </body>
</html>
